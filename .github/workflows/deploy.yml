name: Build and Deploy

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Connect to Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TAILSCALE_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TAILSCALE_OAUTH_CLIENT_SECRET }}
          tags: tag:ci
          ping: ${{ vars.REGISTRY_IP }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ vars.REGISTRY_IP }}:${{ vars.REGISTRY_PORT }}/${{ vars.IMAGE_NAME }}:${{ github.sha }}
          outputs: type=registry,registry.insecure=true

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" | base64 --decode > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Deploy
        env:
          REGISTRY: ${{ vars.REGISTRY_IP }}:${{ vars.REGISTRY_PORT }}
          IMAGE_NAME: ${{ vars.IMAGE_NAME }}
          IMAGE_TAG: ${{ github.sha }}
          DOMAIN: ${{ vars.DOMAIN }}
        run: |
          envsubst < k8s/deployment.yaml.tpl | kubectl apply -f -
          envsubst < k8s/ingress.yaml.tpl | kubectl apply -f -
          kubectl rollout status deployment/www -n www